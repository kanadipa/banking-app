name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_DB: ${{ secrets.POSTGRES_DB_CI }}
          POSTGRES_USER: ${{ secrets.POSTGRES_USER_CI }}
          POSTGRES_PASSWORD: ${{ secrets.POSTGRES_PASSWORD_CI }}
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Set environment
        run: |
          echo "APP_ENV=test" >> $GITHUB_ENV
          echo "LOG_LEVEL=WARNING" >> $GITHUB_ENV
          echo "API_KEY=${{ secrets.API_KEY_CI }}" >> $GITHUB_ENV
          echo "DATABASE_URL=postgresql+asyncpg://${{ secrets.POSTGRES_USER_CI }}:${{ secrets.POSTGRES_PASSWORD_CI }}@${{ secrets.POSTGRES_HOST_CI }}:5432/${{ secrets.POSTGRES_DB_CI }}" >> $GITHUB_ENV

      - name: Install dependencies
        run: pip install ".[dev]"

      - name: Lint
        run: ruff check .

      - name: Run tests
        run: pytest -q
